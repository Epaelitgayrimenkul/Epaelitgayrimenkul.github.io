<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>QR Kartvizit SaaS (Mini)</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 800px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  padding: 10px;
  background: #0d6efd;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 5px;
}

button:hover {
  background: #084cdf;
}

.qr {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📇 QR Kartvizit SaaS (GitHub Edition)</h2>

<div class="card">

<input id="name" placeholder="Ad Soyad">
<input id="company" placeholder="Firma">
<input id="phone" placeholder="Telefon">
<input id="email" placeholder="E-posta">
<input id="website" placeholder="Website">
<input id="instagram" placeholder="Instagram">

<button onclick="saveCard()">Kart Kaydet</button>

</div>

<h3>📁 Kayıtlı Kartlar</h3>
<div id="list"></div>

</div>

<script>

let cards = JSON.parse(localStorage.getItem("cards") || "[]");

function saveCard() {

  const card = {
    id: Date.now(),
    name: name.value,
    company: company.value,
    phone: phone.value,
    email: email.value,
    website: website.value,
    instagram: instagram.value
  };

  cards.push(card);
  localStorage.setItem("cards", JSON.stringify(cards));

  render();
}

function generateVCARD(c) {
  return `BEGIN:VCARD
VERSION:3.0
FN:${c.name}
ORG:${c.company}
TEL:${c.phone}
EMAIL:${c.email}
URL:${c.website}
NOTE:${c.instagram}
END:VCARD`;
}

function render() {

  const list = document.getElementById("list");
  list.innerHTML = "";

  cards.forEach(card => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${card.name}</h3>
      <p>${card.company}</p>
      <p>${card.phone}</p>
      <p>${card.email}</p>

      <canvas id="qr-${card.id}"></canvas>
    `;

    list.appendChild(div);

    const canvas = document.getElementById("qr-" + card.id);

    QRCode.toCanvas(canvas, generateVCARD(card), {
      width: 180,
      errorCorrectionLevel: "H"
    });

  });
}

render();

</script>

</body>
</html>

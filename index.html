<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>QR Kartvizit Oluşturucu</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f3f6f9;
      text-align: center;
      padding: 30px;
    }

    .box {
      background: white;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    canvas {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>📇 QR Kartvizit Oluşturucu</h2>

  <input id="name" placeholder="Ad Soyad">
  <input id="company" placeholder="Şirket">
  <input id="phone" placeholder="Telefon">
  <input id="email" placeholder="E-posta">
  <input id="website" placeholder="Web Site">
  <input id="instagram" placeholder="Instagram (örn: @epagroup)">

  <input type="file" id="logoUpload" accept="image/*">

  <button onclick="generateQR()">QR Oluştur</button>

  <canvas id="qrcode"></canvas>

</div>

<script>
function generateQR() {

  const name = document.getElementById("name").value;
  const company = document.getElementById("company").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;
  const website = document.getElementById("website").value;
  const instagram = document.getElementById("instagram").value;

  const vCard =
`BEGIN:VCARD
VERSION:3.0
FN:${name}
ORG:${company}
TEL:${phone}
EMAIL:${email}
URL:${website}
NOTE:Instagram ${instagram}
END:VCARD`;

  const canvas = document.getElementById("qrcode");

  QRCode.toCanvas(canvas, vCard, {
    width: 220,
    margin: 2,
    errorCorrectionLevel: "H"
  }, function (error) {

    if (error) console.error(error);

    const file = document.getElementById("logoUpload").files[0];

    if (file) {
      const ctx = canvas.getContext("2d");
      const img = new Image();

      img.onload = function () {

        const logoSize = 55;

        const x = (canvas.width - logoSize) / 2;
        const y = (canvas.height - logoSize) / 2;

        // beyaz arka plan
        ctx.fillStyle = "white";
        ctx.fillRect(x, y, logoSize, logoSize);

        ctx.drawImage(img, x, y, logoSize, logoSize);
      };

      img.src = URL.createObjectURL(file);
    }

  });
}
</script>

</body>
</html>

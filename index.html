<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>QR Kartvizit SaaS (Mini)</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 850px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  text-align: left;
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  padding: 8px 12px;
  margin: 5px 3px;
  border: none;
  cursor: pointer;
  color: white;
  border-radius: 5px;
}

.save { background: #0d6efd; }
.save:hover { background: #084cdf; }

.edit { background: #ffc107; color: black; }
.delete { background: #dc3545; }

.qr {
  margin-top: 10px;
  text-align: center;
}

.row {
  display: flex;
  gap: 10px;
}

.row button {
  flex: 1;
}
</style>
</head>

<body>

<div class="container">

<h2>📇 QR Kartvizit SaaS (Mini GitHub Edition)</h2>

<div class="card">

<input id="name" placeholder="Ad Soyad">
<input id="company" placeholder="Firma">
<input id="phone" placeholder="Telefon">
<input id="email" placeholder="E-posta">
<input id="website" placeholder="Website">
<input id="instagram" placeholder="Instagram">

<button class="save" onclick="saveCard()">Kaydet</button>

</div>

<h3>📁 Kartlar</h3>
<div id="list"></div>

</div>

<script>

let cards = JSON.parse(localStorage.getItem("cards") || "[]");
let editId = null;

function saveCard() {

  const card = {
    id: editId ? editId : Date.now(),
    name: name.value,
    company: company.value,
    phone: phone.value,
    email: email.value,
    website: website.value,
    instagram: instagram.value
  };

  if (editId) {
    cards = cards.map(c => c.id === editId ? card : c);
    editId = null;
  } else {
    cards.push(card);
  }

  localStorage.setItem("cards", JSON.stringify(cards));

  clearForm();
  render();
}

function editCard(id) {
  const c = cards.find(x => x.id === id);

  name.value = c.name;
  company.value = c.company;
  phone.value = c.phone;
  email.value = c.email;
  website.value = c.website;
  instagram.value = c.instagram;

  editId = id;
}

function deleteCard(id) {
  cards = cards.filter(c => c.id !== id);
  localStorage.setItem("cards", JSON.stringify(cards));
  render();
}

function clearForm() {
  name.value = "";
  company.value = "";
  phone.value = "";
  email.value = "";
  website.value = "";
  instagram.value = "";
}

function generateVCARD(c) {
  return `BEGIN:VCARD
VERSION:3.0
FN:${c.name}
ORG:${c.company}
TEL:${c.phone}
EMAIL:${c.email}
URL:${c.website}
NOTE:${c.instagram}
END:VCARD`;
}

function render() {

  const list = document.getElementById("list");
  list.innerHTML = "";

  cards.forEach(card => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>🏢 ${card.company}</h3>
      <p>👤 ${card.name}</p>
      <p>📞 ${card.phone}</p>
      <p>📧 ${card.email}</p>

      <div class="row">
        <button class="edit" onclick="editCard(${card.id})">Düzenle</button>
        <button class="delete" onclick="deleteCard(${card.id})">Sil</button>
      </div>

      <div class="qr">
        <canvas id="qr-${card.id}"></canvas>
      </div>
    `;

    list.appendChild(div);

    const canvas = document.getElementById("qr-" + card.id);

    QRCode.toCanvas(canvas, generateVCARD(card), {
      width: 180,
      errorCorrectionLevel: "H"
    });

  });
}

render();

</script>

</body>
</html>
